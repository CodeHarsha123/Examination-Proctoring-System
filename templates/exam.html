<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Exam</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="exam-container">
        <div class="header">
            <h2>Python Exam (30 Minutes)</h2>
            <div id="timer" class="timer">30:00</div>
        </div>

        <div class="monitor-feed">
            <img src="{{ url_for('video_feed') }}" width="400" alt="Video Feed">
            <p class="monitor-status">Monitoring Active</p>
        </div>

        <form class="questions-form">
            {% for q in questions %}
            <div class="question-block">
                <p class="question-text">{{ loop.index }}. {{ q.q }}</p>
                <div class="options">
                    {% for opt in q.a %}
                    <label class="option-label">
                        <input type="radio" name="{{ loop.index }}" value="{{ opt }}">
                        {{ opt }}
                    </label>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
            <button type="submit" class="btn-submit">Submit Exam</button>
        </form>
    </div>

    <script src="/static/js/timer.js"></script>

    <script>
        // Audio Context for alarm tone (avoids needing external file)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let alarmPlaying = false;

        function playAlarm() {
            if (alarmPlaying) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            alarmPlaying = true;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
            oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5); // Slide up to A5

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);

            setTimeout(() => { alarmPlaying = false; }, 500);
        }

        // Poll status
        setInterval(() => {
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    // Check for termination signal
                    if (data.terminate) {
                        window.location.href = "/completed";
                        return;
                    }

                    const statusText = document.querySelector('.monitor-status');
                    statusText.innerText = data.warnings > 0 ? `${data.message} (Warning ${data.warnings}/2)` : data.message;

                    if (data.alarm) {
                        statusText.classList.add('warning');
                        playAlarm();
                    } else {
                        statusText.classList.remove('warning');
                    }
                })
                .catch(err => console.error(err));
        }, 1000);
    </script>
</body>

</html>
